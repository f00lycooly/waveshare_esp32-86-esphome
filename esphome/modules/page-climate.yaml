# ─────────────────────────────────────────────────────────────────────────────
# page-climate.yaml — Climate page package (included by frontroom-panel-modular.yaml)
#
# Owns: the climate_page LVGL page (heat-pump card with setpoint stepper),
# the six clim_* homeassistant sensors, the clim_mode text_sensor, and the
# clim_setpoint_val global. Merged with the other UI packages by ESPHome's
# package mechanism — widget styles/fonts/colours and swipe navigation come
# from the shared/theme/library packages; page order is set by the package
# declaration order in frontroom-panel-modular.yaml.
# ─────────────────────────────────────────────────────────────────────────────

globals:
  # Live heat-pump setpoint (climate_page) — kept in sync by the clim_setpoint
  # sensor so the +/- buttons can compute the next target without re-reading HA.
  - id: clim_setpoint_val
    type: float
    restore_value: false
    initial_value: "20.0"

sensor:
  # ───── Heat pump climate (climate_page — HomeAutomation-4eq.5) ─────
  - platform: homeassistant
    id: clim_current_temp
    entity_id: ${zone_current_temp_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_clim_current
          text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%.1f°", isnan(x)?0.0f:x); return std::string(b);'
  - platform: homeassistant
    id: clim_setpoint
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      - lambda: |-
          id(clim_setpoint_val) = isnan(x) ? 0.0f : x;
          char b[12]; snprintf(b, sizeof(b), "%.1f°", id(clim_setpoint_val));
          lv_label_set_text(id(lbl_clim_setpoint), b);
  - platform: homeassistant
    id: clim_humidity
    entity_id: ${zone_humidity_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_clim_humidity
          text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%.0f%%", isnan(x)?0.0f:x); return std::string(b);'
  - platform: homeassistant
    id: clim_outdoor
    entity_id: ${outdoor_temp_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_clim_outdoor
          text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%.1f°", isnan(x)?0.0f:x); return std::string(b);'
  - platform: homeassistant
    id: clim_flow
    entity_id: ${heating_flow_temp_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_clim_flow
          text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%.1f°", isnan(x)?0.0f:x); return std::string(b);'
  - platform: homeassistant
    id: clim_hotwater
    entity_id: ${hot_water_temp_entity}
    on_value:
      - lvgl.label.update:
          id: lbl_clim_hotwater
          text: !lambda 'char b[12]; snprintf(b, sizeof(b), "%.1f°", isnan(x)?0.0f:x); return std::string(b);'

text_sensor:
  # Heat-pump HVAC mode (climate_page) → mode badge text + colour.
  - platform: homeassistant
    id: clim_mode
    entity_id: ${climate_entity}
    on_value:
      - lambda: !lambda |-
          std::string m = x;
          lv_color_t c = (m == "heat") ? lv_color_hex(0xF37320)
                       : (m == "cool") ? lv_color_hex(0x01B4DE)
                       : (m == "auto") ? lv_color_hex(0x7ACF38)
                                       : lv_color_hex(0x9E9E9E);
          lv_obj_set_style_text_color(id(lbl_clim_mode), c, 0);
          for (auto &ch : m) ch = toupper(ch);
          lv_label_set_text(id(lbl_clim_mode), m.c_str());

lvgl:
  pages:
    # ═════════════════════ CLIMATE (HomeAutomation-4eq.5) ═════════════════════
    - id: climate_page
      styles: page_style
      <<: !include
        file: ../esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
      widgets:
        - button:
            id: back_climate
            align: TOP_LEFT
            x: 8
            y: 8
            width: 56
            height: 56
            radius: 28
            bg_color: very_dark_gray
            widgets:
              - label: {align: center, text: $mdi_chevron_left, text_font: mdi_card_28, text_color: white}
            on_click:
              - lvgl.page.show: main_page
        - label: {align: TOP_MID, y: 18, text: "Climate", styles: header_title}
        - label: {id: lbl_clim_mode, align: TOP_RIGHT, x: -18, y: 22, text_font: oswald_20, text_color: gray500, text: "—"}

        # Current temperature (big) + setpoint stepper
        - label: {id: lbl_clim_current, align: TOP_MID, y: 120, text_font: oswald_72, text_color: white, text: "--°"}
        - label: {align: TOP_MID, y: 210, text: "CURRENT", styles: caption}
        - obj:
            align: TOP_MID
            y: 250
            width: 360
            height: 90
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            scrollable: false
            layout: {type: flex, flex_flow: ROW, flex_align_main: CENTER, flex_align_cross: CENTER, pad_column: 18}
            widgets:
              - button:
                  id: btn_clim_down
                  width: 80
                  height: 80
                  radius: 40
                  bg_color: very_dark_gray
                  widgets:
                    - label: {align: center, text: $mdi_minus, text_font: mdi_card_28, text_color: ep_blue}
                  on_click:
                    - lambda: |-
                        id(clim_setpoint_val) -= 0.5f;
                        char b[12]; snprintf(b, sizeof(b), "%.1f°", id(clim_setpoint_val));
                        lv_label_set_text(id(lbl_clim_setpoint), b);
                    - homeassistant.action:
                        action: climate.set_temperature
                        data: {entity_id: "${climate_entity}"}
                        variables: {temp: 'return id(clim_setpoint_val);'}
                        data_template: {temperature: "{{ temp }}"}
              - label: {id: lbl_clim_setpoint, text_font: oswald_42, text_color: ep_orange, text: "--°"}
              - button:
                  id: btn_clim_up
                  width: 80
                  height: 80
                  radius: 40
                  bg_color: very_dark_gray
                  widgets:
                    - label: {align: center, text: $mdi_plus, text_font: mdi_card_28, text_color: ep_orange}
                  on_click:
                    - lambda: |-
                        id(clim_setpoint_val) += 0.5f;
                        char b[12]; snprintf(b, sizeof(b), "%.1f°", id(clim_setpoint_val));
                        lv_label_set_text(id(lbl_clim_setpoint), b);
                    - homeassistant.action:
                        action: climate.set_temperature
                        data: {entity_id: "${climate_entity}"}
                        variables: {temp: 'return id(clim_setpoint_val);'}
                        data_template: {temperature: "{{ temp }}"}

        # Secondary stats strip (humidity / outdoor / flow / hot water)
        - obj:
            id: clim_stats
            styles: pill
            align: BOTTOM_MID
            y: -20
            width: 700
            height: 120
            scrollable: false
            layout: {type: flex, flex_flow: ROW, flex_align_main: SPACE_EVENLY, flex_align_cross: CENTER, pad_column: 4}
            widgets:
              - obj: {width: 150, height: 96, bg_opa: TRANSP, border_width: 0, pad_all: 0, scrollable: false, layout: {type: flex, flex_flow: COLUMN, flex_align_main: CENTER, flex_align_cross: CENTER, pad_row: 2}, widgets: [{label: {text: $mdi_water_percent, text_font: mdi_icon_40, text_color: ep_blue}}, {label: {id: lbl_clim_humidity, text_font: oswald_24, text_color: white, text: "--%"}}, {label: {text: "HUMIDITY", styles: caption}}]}
              - obj: {width: 150, height: 96, bg_opa: TRANSP, border_width: 0, pad_all: 0, scrollable: false, layout: {type: flex, flex_flow: COLUMN, flex_align_main: CENTER, flex_align_cross: CENTER, pad_row: 2}, widgets: [{label: {text: $mdi_weather_partly_cloudy, text_font: mdi_icon_40, text_color: gray400}}, {label: {id: lbl_clim_outdoor, text_font: oswald_24, text_color: white, text: "--°"}}, {label: {text: "OUTSIDE", styles: caption}}]}
              - obj: {width: 150, height: 96, bg_opa: TRANSP, border_width: 0, pad_all: 0, scrollable: false, layout: {type: flex, flex_flow: COLUMN, flex_align_main: CENTER, flex_align_cross: CENTER, pad_row: 2}, widgets: [{label: {text: $mdi_radiator, text_font: mdi_icon_40, text_color: ep_orange}}, {label: {id: lbl_clim_flow, text_font: oswald_24, text_color: white, text: "--°"}}, {label: {text: "FLOW", styles: caption}}]}
              - obj: {width: 150, height: 96, bg_opa: TRANSP, border_width: 0, pad_all: 0, scrollable: false, layout: {type: flex, flex_flow: COLUMN, flex_align_main: CENTER, flex_align_cross: CENTER, pad_row: 2}, widgets: [{label: {text: $mdi_water_boiler, text_font: mdi_icon_40, text_color: ep_orange}}, {label: {id: lbl_clim_hotwater, text_font: oswald_24, text_color: white, text: "--°"}}, {label: {text: "HOT WATER", styles: caption}}]}
