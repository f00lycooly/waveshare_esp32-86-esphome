# ─────────────────────────────────────────────────────────────────────────────
# page-media.yaml — Media page package for the frontroom panel.
# Included as a package by frontroom-panel-modular.yaml.
#
# Owns: the media_page LVGL page (transport card + 3×3 device-selector grid),
# the active_media_player global, the refresh_device_sel highlight script, the
# media_volume sensor, and the four frontroom_active_media text_sensors
# (state / title / device_name / active-player sync mirror).
#
# Cross-package IDs (resolved at package merge): nav_tile/card/header_title/
# page_style styles, ep_blue/very_dark_gray/gray500 colours, nunito_*/mdi_*
# fonts and glyph substitutions (library packages), main_page (page-main).
# ─────────────────────────────────────────────────────────────────────────────

script:
  # Rooms modal (HomeAutomation-4eq.20, restyled 4eq.24): paint each tile from the
  # staged-selection vector with a NO-LEGEND visual: coordinator (index 0) = SOLID
  # ep_blue + dark caption; other staged = faint tint + ep_blue OUTLINE; unstaged =
  # dark. The live play/pause glyph is driven separately by apply_room_status.
  - id: refresh_device_sel
    then:
      - lambda: |-
          auto &v = id(staged_players);
          auto idx = [&](const char* p) -> int {
            for (size_t i = 0; i < v.size(); i++) if (v[i] == p) return (int)i;
            return -1;
          };
          auto mark = [&](lv_obj_t* tile, lv_obj_t* cap, const char* player){
            int i = idx(player);
            if (i == 0) {                                  // coordinator: solid + dark caption
              lv_obj_set_style_bg_color(tile, lv_color_hex(0x01B4DE), 0);
              lv_obj_set_style_border_width(tile, 0, 0);
              lv_obj_set_style_text_color(cap, lv_color_hex(0x0D0D0D), 0);
            } else if (i > 0) {                            // member: tint + ep_blue outline
              lv_obj_set_style_bg_color(tile, lv_color_hex(0x16323B), 0);
              lv_obj_set_style_border_width(tile, 2, 0);
              lv_obj_set_style_border_color(tile, lv_color_hex(0x01B4DE), 0);
              lv_obj_set_style_text_color(cap, lv_color_hex(0xF2F0EB), 0);
            } else {                                       // unstaged: dark
              lv_obj_set_style_bg_color(tile, lv_color_hex(0x313131), 0);
              lv_obj_set_style_border_width(tile, 0, 0);
              lv_obj_set_style_text_color(cap, lv_color_hex(0xF2F0EB), 0);
            }
          };
          mark(id(m_living),  id(m_living_cap),  "${sonos_living_room_entity}");
          mark(id(m_kitchen), id(m_kitchen_cap), "${sonos_kitchen_entity}");
          mark(id(m_kitchen2),id(m_kitchen2_cap),"${sonos_kitchen_2_entity}");
          mark(id(m_office),  id(m_office_cap),  "${sonos_office_entity}");
          mark(id(m_bedroom), id(m_bedroom_cap), "${sonos_bedroom_entity}");
          mark(id(m_garage),  id(m_garage_cap),  "${sonos_garage_entity}");
          mark(id(m_roam),    id(m_roam_cap),    "${sonos_roam_entity}");
          int n = (int)v.size();
          if (n == 0) {
            lv_label_set_text(id(lbl_rooms_status), "Tap rooms to group · 1st plays");
          } else {
            char buf[44];
            snprintf(buf, sizeof(buf), "%d room%s grouped · 1st plays from", n, n == 1 ? "" : "s");
            lv_label_set_text(id(lbl_rooms_status), buf);
          }

  # Rooms modal (HomeAutomation-4eq.20): toggle a room in the staged vector. If it
  # becomes/loses the front (coordinator), sync active_media_player + the HA mirror
  # so transport/now-playing follow the coordinator. Then repaint the grid.
  - id: stage_toggle
    parameters:
      player: string
    then:
      - lambda: |-
          auto &v = id(staged_players);
          bool found = false;
          for (size_t i = 0; i < v.size(); i++) {
            if (v[i] == player) { v.erase(v.begin() + i); found = true; break; }
          }
          if (!found) v.push_back(player);
          if (!v.empty()) id(active_media_player) = v.front();
      - homeassistant.action:
          action: input_text.set_value
          data_template:
            entity_id: ${active_player_selector_entity}
            value: "{{ tgt }}"
          variables:
            tgt: 'return id(active_media_player);'
      - script.execute: refresh_device_sel

  # Rooms modal (HomeAutomation-4eq.20/.22, restyled 4eq.24): read a tile's live HA
  # state from its topology string "<state>|<is_coordinator>|<group_size>". Drives
  # the self-evident play/pause glyph (play=playing green / pause=paused amber /
  # hidden=idle). Group-role is no longer badged (no-legend redesign) but the live
  # coord/size are still cached so Group can decide whether to free the coordinator.
  - id: apply_room_status
    parameters:
      room: int
      info: string
    then:
      - lambda: |-
          static lv_obj_t* dots[7] = { id(m_living_dot), id(m_kitchen_dot), id(m_kitchen2_dot), id(m_office_dot), id(m_bedroom_dot), id(m_garage_dot), id(m_roam_dot) };
          if (room < 0 || room > 6) return;
          std::string s = info;
          size_t p1 = s.find('|');
          size_t p2 = (p1 == std::string::npos) ? std::string::npos : s.find('|', p1 + 1);
          std::string st = (p1 == std::string::npos) ? s : s.substr(0, p1);
          int coord = 0, size = 1;
          if (p1 != std::string::npos && p2 != std::string::npos) {
            coord = atoi(s.substr(p1 + 1, p2 - p1 - 1).c_str());
            size  = atoi(s.substr(p2 + 1).c_str());
          }
          // Cache live role/size so Group can decide whether to free the coordinator.
          id(room_coord)[room] = coord;
          id(room_size)[room]  = size;
          lv_obj_t* dot = dots[room];
          // Live playback glyph — self-evident, no legend.
          if (st.find("playing") != std::string::npos) {
            lv_label_set_text(dot, "$mdi_play");
            lv_obj_set_style_text_color(dot, lv_color_hex(0x7ACF38), 0);
            lv_obj_clear_flag(dot, LV_OBJ_FLAG_HIDDEN);
          } else if (st.find("paused") != std::string::npos) {
            lv_label_set_text(dot, "$mdi_pause");
            lv_obj_set_style_text_color(dot, lv_color_hex(0xF4A900), 0);
            lv_obj_clear_flag(dot, LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(dot, LV_OBJ_FLAG_HIDDEN);
          }

  # media_page (HomeAutomation-4eq.19): paint the shuffle button. ON = filled
  # cyan + black glyph (like the play button); OFF = dim gray fill + gray glyph.
  - id: refresh_shuffle_btn
    then:
      - lambda: |-
          bool on = id(media_shuffle);
          lv_obj_set_style_bg_color(id(btn_media_shuffle),
            on ? lv_color_hex(0x01B4DE) : lv_color_hex(0x1A1A1A), 0);
          lv_obj_set_style_text_color(id(ic_media_shuffle),
            on ? lv_color_hex(0x000000) : lv_color_hex(0x6B6B6B), 0);

  # media_page (HomeAutomation-4eq.19): paint the repeat button — glyph reflects
  # the mode (off/all/one). ON (all/one) = filled cyan + black glyph; OFF = dim.
  - id: refresh_repeat_btn
    then:
      - lambda: |-
          const std::string &r = id(media_repeat);
          bool on = (r != "off");
          lv_label_set_text(id(ic_media_repeat),
            r == "one" ? "$mdi_repeat_once" : (r == "all" ? "$mdi_repeat" : "$mdi_repeat_off"));
          lv_obj_set_style_bg_color(id(btn_media_repeat),
            on ? lv_color_hex(0x01B4DE) : lv_color_hex(0x1A1A1A), 0);
          lv_obj_set_style_text_color(id(ic_media_repeat),
            on ? lv_color_hex(0x000000) : lv_color_hex(0x6B6B6B), 0);

  # Playlists modal (HomeAutomation-4eq.17): play grid tile `idx`. Re-adds the
  # "spotify:playlist:" prefix to the bare ID and calls media_player.play_media on
  # the active coordinator (active_media_player = front of the staged group, set by
  # the Rooms modal). Sonos resolves the spotify: URI locally, so this works even
  # though the Spotify Connect API can't target Sonos directly. content_type=music.
  # No-op when idx is out of range or the slot is empty (list not loaded / <8 favs).
  - id: play_playlist
    parameters:
      idx: int
    then:
      - if:
          condition:
            lambda: 'return idx >= 0 && idx < (int) id(playlist_ids).size() && !id(playlist_ids)[idx].empty();'
          then:
            - homeassistant.action:
                action: media_player.play_media
                variables:
                  tgt: 'return id(active_media_player);'
                  uri: 'return std::string("spotify:playlist:") + id(playlist_ids)[idx];'
                data_template:
                  entity_id: "{{ tgt }}"
                  media_content_id: "{{ uri }}"
                  media_content_type: music
            # Dismiss the modal so the now-playing hero (main_page) shows the result.
            - script.execute: popup_close

  # Playlists modal (HomeAutomation-4eq.21): register the two media modals with the
  # library popup framework so the shared scrim / outside-tap / timeout close
  # them. popup_close already hides popup_scrim; we add our two overlays.
  - id: !extend popup_close
    then:
      - lvgl.widget.hide: rooms_modal
      - lvgl.widget.hide: sources_modal

globals:
  # media_page (HomeAutomation-4eq.16): entity_id of the media_player the primary
  # card currently targets. Set on device-tile tap (also mirrored to HA via
  # ${active_player_selector_entity}); read by the transport/volume actions.
  # Kept in sync from the input_text mirror so external changes + reboot restore.
  - id: active_media_player
    type: std::string
    restore_value: true
    initial_value: '"${sonos_living_room_entity}"'
  # media_page (HomeAutomation-4eq.19): current shuffle/repeat state of the active
  # player, mirrored from ${active_media_mirror_entity} so the toggle actions can
  # compute the next value (shuffle invert; repeat cycle off->all->one->off).
  - id: media_shuffle
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: media_repeat
    type: std::string
    restore_value: false
    initial_value: '"off"'
  # Rooms modal (HomeAutomation-4eq.20): ordered staged-selection of Sonos rooms
  # for grouping. Front element is the coordinator (= active_media_player). Empty
  # = nothing staged. Not restored (group state is live, re-read from HA on boot).
  - id: staged_players
    type: std::vector<std::string>
    restore_value: false
  # Live HA group role/size per room (index 0..6 = living/kitchen/kitchen_2/office/
  # bedroom/garage/roam), kept current by apply_room_status from the .22 topology.
  # Used by Group to decide whether the chosen coordinator must be freed first.
  # Defaults (coord=0, size=1) mean "standalone" -> Group does a non-destructive add.
  - id: room_coord
    type: int[7]
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0, 0}'
  - id: room_size
    type: int[7]
    restore_value: false
    initial_value: '{1, 1, 1, 1, 1, 1, 1}'
  # Playlists modal (HomeAutomation-4eq.17): BARE base62 playlist IDs for the 8
  # grid tiles, parsed from the ids_8 attribute of ${spotify_playlists_entity}.
  # Index 0..7 maps to tiles pl_tile_0..7. play_playlist re-adds the
  # "spotify:playlist:" prefix. Not restored (re-published by the HA glue on boot).
  - id: playlist_ids
    type: std::vector<std::string>
    restore_value: false

sensor:
  # ───── Media primary volume (media_page — follows selected player via mirror) ─────
  - platform: homeassistant
    id: media_volume
    entity_id: ${active_media_mirror_entity}
    attribute: volume
    on_value:
      - lvgl.slider.update:
          id: sld_media_vol
          value: !lambda 'return isnan(x) ? 0 : (int)lroundf(x*100.0f);'

text_sensor:
  # Media primary (media_page — follows selected player via mirror sensor):
  # state → play/pause glyph; title text; device_name caption.
  - platform: homeassistant
    id: media_state
    entity_id: ${active_media_mirror_entity}
    on_value:
      - lambda: !lambda |-
          bool playing = (x == "playing");
          lv_label_set_text(id(ic_media_playpause), playing ? "$mdi_pause" : "$mdi_play");
  - platform: homeassistant
    id: media_title
    entity_id: ${active_media_mirror_entity}
    attribute: title
    on_value:
      - lvgl.label.update:
          id: lbl_media_title
          text: !lambda 'return x.empty() ? std::string("—") : x;'
  - platform: homeassistant
    id: media_device_name
    entity_id: ${active_media_mirror_entity}
    attribute: device_name
    on_value:
      - lvgl.label.update:
          id: lbl_media_device
          text: !lambda 'return x.empty() ? std::string("—") : x;'
  # Artist (media_page hero — HomeAutomation-4eq.21): follows the mirror sensor.
  - platform: homeassistant
    id: media_artist
    entity_id: ${active_media_mirror_entity}
    attribute: artist
    on_value:
      - lvgl.label.update:
          id: lbl_media_artist
          text: !lambda 'return x.empty() ? std::string("") : x;'
  # Album art (media_page hero — HomeAutomation-4eq.14): the mirror exposes a
  # relative entity_picture (/api/media_player_proxy/...?token=...). Prefix the HA
  # base, fetch via online_image; empty -> revert to the speaker-glyph fallback.
  - platform: homeassistant
    id: media_art_url
    entity_id: ${active_media_mirror_entity}
    attribute: entity_picture
    on_value:
      - if:
          condition:
            lambda: 'return x.empty();'
          then:
            - lvgl.widget.hide: img_album_art
            - lvgl.widget.show: ic_album_art_fallback
          else:
            - online_image.set_url:
                id: album_art_image
                url: !lambda |-
                  if (x.rfind("http", 0) == 0) return x;
                  return std::string("${ha_base_url}") + x;
  # Shuffle / repeat state (media_page — HomeAutomation-4eq.19): follow the active
  # player via the mirror sensor; store into globals + repaint the toggle buttons.
  - platform: homeassistant
    id: media_shuffle_state
    entity_id: ${active_media_mirror_entity}
    attribute: shuffle
    on_value:
      - lambda: 'id(media_shuffle) = (x == "on");'
      - script.execute: refresh_shuffle_btn
  - platform: homeassistant
    id: media_repeat_state
    entity_id: ${active_media_mirror_entity}
    attribute: repeat
    on_value:
      - lambda: 'id(media_repeat) = x.empty() ? std::string("off") : x;'
      - script.execute: refresh_repeat_btn
  # Active-player selection mirror: keeps the ESPHome global in sync with HA
  # (covers external changes + reboot restore) and refreshes the tile highlight.
  - platform: homeassistant
    id: active_player_sync
    entity_id: ${active_player_selector_entity}
    on_value:
      - lambda: 'if (!x.empty() && x != "unknown") id(active_media_player) = x;'
      - script.execute: refresh_device_sel
  # Live per-room status (Rooms modal — HomeAutomation-4eq.20/.22). Each reads one
  # room's "<state>|<coord>|<size>" attribute off ${sonos_topology_entity}
  # and hands it to apply_room_status to paint that tile's dot + group badge.
  - platform: homeassistant
    id: topo_living
    entity_id: ${sonos_topology_entity}
    attribute: living_room
    on_value:
      - script.execute: {id: apply_room_status, room: 0, info: !lambda 'return x;'}
  - platform: homeassistant
    id: topo_kitchen
    entity_id: ${sonos_topology_entity}
    attribute: kitchen
    on_value:
      - script.execute: {id: apply_room_status, room: 1, info: !lambda 'return x;'}
  - platform: homeassistant
    id: topo_kitchen2
    entity_id: ${sonos_topology_entity}
    attribute: kitchen_2
    on_value:
      - script.execute: {id: apply_room_status, room: 2, info: !lambda 'return x;'}
  - platform: homeassistant
    id: topo_office
    entity_id: ${sonos_topology_entity}
    attribute: office
    on_value:
      - script.execute: {id: apply_room_status, room: 3, info: !lambda 'return x;'}
  - platform: homeassistant
    id: topo_bedroom
    entity_id: ${sonos_topology_entity}
    attribute: bedroom
    on_value:
      - script.execute: {id: apply_room_status, room: 4, info: !lambda 'return x;'}
  - platform: homeassistant
    id: topo_garage
    entity_id: ${sonos_topology_entity}
    attribute: garage
    on_value:
      - script.execute: {id: apply_room_status, room: 5, info: !lambda 'return x;'}
  - platform: homeassistant
    id: topo_roam
    entity_id: ${sonos_topology_entity}
    attribute: sonos_roam
    on_value:
      - script.execute: {id: apply_room_status, room: 6, info: !lambda 'return x;'}
  # Playlists modal (HomeAutomation-4eq.17): the SpotifyPlus glue (spotify_panel.yaml,
  # 4eq.15) republishes the first 8 favourite playlists as two newline-joined
  # attributes on ${spotify_playlists_entity}. names_8 → grid tile captions
  # (empty/absent slots hide their tile); ids_8 → the bare-ID lookup table the
  # play_playlist script indexes. Both stay under the ESPHome 255-char cap.
  - platform: homeassistant
    id: spotify_playlist_names
    entity_id: ${spotify_playlists_entity}
    attribute: names_8
    on_value:
      - lambda: |-
          static lv_obj_t* tiles[8] = { id(pl_tile_0), id(pl_tile_1), id(pl_tile_2), id(pl_tile_3),
                                        id(pl_tile_4), id(pl_tile_5), id(pl_tile_6), id(pl_tile_7) };
          static lv_obj_t* names[8] = { id(pl_tile_0_name), id(pl_tile_1_name), id(pl_tile_2_name), id(pl_tile_3_name),
                                        id(pl_tile_4_name), id(pl_tile_5_name), id(pl_tile_6_name), id(pl_tile_7_name) };
          std::string s = x;
          for (int i = 0; i < 8; i++) {
            size_t nl = s.find('\n');
            std::string name = (i < 7) ? s.substr(0, nl) : s;   // last tile takes the remainder
            if (nl == std::string::npos) name = s;
            if (!name.empty()) {
              lv_label_set_text(names[i], name.c_str());
              lv_obj_clear_flag(tiles[i], LV_OBJ_FLAG_HIDDEN);
            } else {
              lv_label_set_text(names[i], "");
              lv_obj_add_flag(tiles[i], LV_OBJ_FLAG_HIDDEN);
            }
            if (nl == std::string::npos) { s.clear(); }
            else { s = s.substr(nl + 1); }
          }
  - platform: homeassistant
    id: spotify_playlist_ids
    entity_id: ${spotify_playlists_entity}
    attribute: ids_8
    on_value:
      - lambda: |-
          auto &v = id(playlist_ids);
          v.clear();
          std::string s = x;
          while (true) {
            size_t nl = s.find('\n');
            std::string id_str = (nl == std::string::npos) ? s : s.substr(0, nl);
            v.push_back(id_str);
            if (nl == std::string::npos) break;
            s = s.substr(nl + 1);
          }

online_image:
  # Album art for the hub hero (HomeAutomation-4eq.14). URL is set at runtime from
  # the mirror's entity_picture (local HTTP + token); resize is MANDATORY so the
  # decoder targets 240x240 and never tries to decode an oversized source JPEG
  # (the HA proxy can serve large/HEIC payloads). Uses the existing http_request.
  - id: album_art_image
    url: "${ha_base_url}/"   # placeholder; real URL pushed via set_url
    # HA media_player_proxy + Spotify art are JPEG. (No AUTO in this ESPHome; PNG
    # art would fall through to on_error -> fallback glyph, acceptable.)
    format: JPEG
    type: RGB565
    resize: 240x240
    update_interval: never
    on_download_finished:
      - lvgl.image.update:
          id: img_album_art
          src: album_art_image
      - lvgl.widget.show: img_album_art
      - lvgl.widget.hide: ic_album_art_fallback
    on_error:
      - logger.log: "album art download failed; showing fallback glyph"
      - lvgl.widget.hide: img_album_art
      - lvgl.widget.show: ic_album_art_fallback

lvgl:
  # ═════════════════════ MODAL OVERLAYS (HomeAutomation-4eq.21) ═════════════════════
  # Popups in the library's top_layer framework: the shared popup_scrim (from
  # popup_system.yaml) dims the hub behind them and an outside-tap runs popup_close
  # (extended above to hide both). Because the scrim is a full-screen clickable
  # sibling, swipe gestures land on it — the hub page underneath does not navigate.
  top_layer:
    widgets:
      # ─── Rooms modal (shell — grouping content lands in 4eq.20) ───
      - obj:
          id: rooms_modal
          hidden: true
          align: center
          width: 664
          height: 632
          bg_color: very_dark_gray
          bg_opa: cover
          radius: 24
          border_width: 1
          border_color: gray700
          pad_all: 16
          scrollable: false
          widgets:
            - label: {align: TOP_LEFT, x: 6, y: 8, text: "Rooms", styles: header_title}
            - button:
                id: btn_close_rooms
                align: TOP_RIGHT
                x: 0
                y: 0
                width: 52
                height: 52
                radius: 26
                bg_color: very_dark_gray
                widgets:
                  - label: {align: center, text: $mdi_close, text_font: mdi_card_28, text_color: white}
                on_click:
                  - script.execute: popup_close
            # Selection summary (updated by refresh_device_sel). Green dot on a tile
            # = that room is currently playing (from the .22 topology sensor).
            - label: {id: lbl_rooms_status, align: TOP_MID, y: 12, text_font: oswald_18, text_color: gray400, text: "Tap rooms to group"}
            # Staged multi-select grid — 7 Sonos rooms (HomeAutomation-4eq.20).
            # First tap = coordinator (solid ep_blue); further taps = members
            # (ep_blue outline); tap again to deselect. Group joins; Ungroup dissolves.
            - obj:
                align: TOP_MID
                y: 50
                width: 624
                height: 380
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollable: false
                layout:
                  type: GRID
                  grid_columns: [FR(1), FR(1), FR(1)]
                  grid_rows: [FR(1), FR(1), FR(1)]
                  pad_column: 12
                  pad_row: 12
                widgets:
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_living,   col: 0, row: 0, caption: "Living Rm", player: "${sonos_living_room_entity}"}}
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_kitchen,  col: 1, row: 0, caption: "Kitchen",   player: "${sonos_kitchen_entity}"}}
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_kitchen2, col: 2, row: 0, caption: "Kitchen 2", player: "${sonos_kitchen_2_entity}"}}
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_office,   col: 0, row: 1, caption: "Office",    player: "${sonos_office_entity}"}}
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_bedroom,  col: 1, row: 1, caption: "Bedroom",   player: "${sonos_bedroom_entity}"}}
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_garage,   col: 2, row: 1, caption: "Garage",    player: "${sonos_garage_entity}"}}
                  - !include {file: widgets/tile_media_device.yaml, vars: {tile_id: m_roam,     col: 0, row: 2, caption: "Roam",      player: "${sonos_roam_entity}"}}
            # (No legend — the solid/outline tiles + play/pause glyphs are self-evident, 4eq.24.)
            # Action bar: Group (detach staged + join -> coordinator) / Ungroup (dissolve + clear).
            - obj:
                align: BOTTOM_MID
                y: -2
                width: 624
                height: 84
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollable: false
                layout: {type: flex, flex_flow: ROW, flex_align_main: SPACE_EVENLY, flex_align_cross: CENTER, pad_column: 16}
                widgets:
                  - button:
                      id: btn_group
                      width: 296
                      height: 72
                      radius: 16
                      bg_color: ep_green
                      scrollable: false
                      layout: {type: flex, flex_flow: ROW, flex_align_main: CENTER, flex_align_cross: CENTER, pad_column: 10}
                      widgets:
                        - label: {text: $mdi_link_variant, text_font: mdi_icon_40, text_color: black}
                        - label: {text: "Group", text_font: oswald_20, text_color: black}
                      on_click:
                        # Commit & close: dismiss the modal IMMEDIATELY. Hide the modal
                        # + scrim INLINE first — a bare `script.execute: popup_close`
                        # only queues the hide, which the trailing 1000ms delay in this
                        # same handler defers, so the modal lingered (4eq.24 bugfix).
                        # popup_close still runs to honor the framework contract
                        # (hides sources_modal + clears the auto-close timeout).
                        - lvgl.widget.hide: rooms_modal
                        - lvgl.widget.hide: popup_scrim
                        - script.execute: popup_close
                        # Only FREE the chosen coordinator (front) when it is a STUCK
                        # non-coordinator member of another group (live topology:
                        # coord==0 && size>1) — that case otherwise refuses to play.
                        # If front is already a coordinator/standalone, SKIP the unjoin
                        # so adding a speaker to an existing group does NOT stop/restart
                        # playback (just an incremental join below). When topology data
                        # hasn't loaded yet, defaults (coord 0 / size 1) -> skip = safe.
                        - if:
                            condition:
                              lambda: |-
                                auto &v = id(staged_players);
                                if (v.empty()) return false;
                                static const char* R[7] = {"${sonos_living_room_entity}","${sonos_kitchen_entity}","${sonos_kitchen_2_entity}","${sonos_office_entity}","${sonos_bedroom_entity}","${sonos_garage_entity}","${sonos_roam_entity}"};
                                int idx = -1;
                                for (int i = 0; i < 7; i++) if (v.front() == R[i]) idx = i;
                                if (idx < 0) return false;
                                return id(room_coord)[idx] == 0 && id(room_size)[idx] > 1;
                            then:
                              - homeassistant.action:
                                  action: media_player.unjoin
                                  data_template:
                                    entity_id: "{{ coord }}"
                                  variables:
                                    coord: 'return id(staged_players).front();'
                              - delay: 1000ms
                        # Add the staged rooms onto the coordinator (front). Joining
                        # rooms already in the group is a no-op, so this is a clean
                        # incremental add when front is already the coordinator.
                        - if:
                            condition:
                              lambda: 'return id(staged_players).size() >= 2;'
                            then:
                              - homeassistant.action:
                                  action: media_player.join
                                  variables:
                                    coord: 'return id(staged_players).front();'
                                    members: |-
                                      std::string s; auto &v = id(staged_players);
                                      for (size_t i = 0; i < v.size(); i++) { if (i) s += ","; s += v[i]; }
                                      return s;
                                  data_template:
                                    entity_id: "{{ coord }}"
                                    group_members: "{{ members.split(',') }}"
                  - button:
                      id: btn_ungroup
                      width: 296
                      height: 72
                      radius: 16
                      bg_color: very_dark_gray
                      scrollable: false
                      layout: {type: flex, flex_flow: ROW, flex_align_main: CENTER, flex_align_cross: CENTER, pad_column: 10}
                      widgets:
                        - label: {text: $mdi_link_off, text_font: mdi_icon_40, text_color: white}
                        - label: {text: "Ungroup", text_font: oswald_20, text_color: white}
                      on_click:
                        # Dissolve: unjoin every staged room, then clear the staging.
                        - if:
                            condition:
                              lambda: 'return !id(staged_players).empty();'
                            then:
                              - homeassistant.action:
                                  action: media_player.unjoin
                                  variables:
                                    members: |-
                                      std::string s; auto &v = id(staged_players);
                                      for (size_t i = 0; i < v.size(); i++) { if (i) s += ","; s += v[i]; }
                                      return s;
                                  data_template:
                                    entity_id: "{{ members.split(',') }}"
                        - lambda: 'id(staged_players).clear();'
                        - script.execute: refresh_device_sel
      # ─── Playlists modal (shell — SpotifyPlus list lands in 4eq.17) ───
      - obj:
          id: sources_modal
          hidden: true
          align: center
          width: 664
          height: 632
          bg_color: very_dark_gray
          bg_opa: cover
          radius: 24
          border_width: 1
          border_color: gray700
          pad_all: 16
          scrollable: false
          widgets:
            - label: {align: TOP_LEFT, x: 6, y: 8, text: "Playlists", styles: header_title}
            - button:
                id: btn_close_sources
                align: TOP_RIGHT
                x: 0
                y: 0
                width: 52
                height: 52
                radius: 26
                bg_color: very_dark_gray
                widgets:
                  - label: {align: center, text: $mdi_close, text_font: mdi_card_28, text_color: white}
                on_click:
                  - script.execute: popup_close
            # Sub-caption. Tiles populate from the SpotifyPlus favourites glue
            # (4eq.15); empty list -> all tiles hidden, only this line shows.
            - label: {id: lbl_sources_status, align: TOP_MID, y: 12, text_font: oswald_18, text_color: gray400, text: "Your favourites · tap to play"}
            # 4×2 grid of colour-gradient playlist tiles (HomeAutomation-4eq.17).
            # Glyph + gradient per cell are decorative (fixed); the name comes from
            # the names_8 text_sensor and the tap plays playlist `idx` on the
            # active coordinator. No remote cover art (P4-impractical, see widget).
            - obj:
                align: TOP_MID
                y: 50
                width: 632
                height: 330
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollable: false
                layout:
                  type: GRID
                  grid_columns: [FR(1), FR(1), FR(1), FR(1)]
                  grid_rows: [FR(1), FR(1)]
                  pad_column: 12
                  pad_row: 12
                widgets:
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_0, idx: 0, col: 0, row: 0, glyph: $mdi_heart,               grad_top: 0x6A4FB0, grad_bottom: 0x2A1F52}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_1, idx: 1, col: 1, row: 0, glyph: $mdi_compass,             grad_top: 0x1F6B63, grad_bottom: 0x103B37}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_2, idx: 2, col: 2, row: 0, glyph: $mdi_guitar_acoustic,     grad_top: 0x6B4A1F, grad_bottom: 0x3A2810}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_3, idx: 3, col: 3, row: 0, glyph: $mdi_headphones,          grad_top: 0x2A3F6B, grad_bottom: 0x15203A}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_4, idx: 4, col: 0, row: 1, glyph: $mdi_music_note,          grad_top: 0x7A2F57, grad_bottom: 0x3A1530}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_5, idx: 5, col: 1, row: 1, glyph: $mdi_white_balance_sunny, grad_top: 0x2F6B3A, grad_bottom: 0x163A20}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_6, idx: 6, col: 2, row: 1, glyph: $mdi_run_fast,            grad_top: 0x8A3320, grad_bottom: 0x4A1A10}}
                  - !include {file: widgets/tile_playlist.yaml, vars: {tile_id: pl_tile_7, idx: 7, col: 3, row: 1, glyph: $mdi_saxophone,           grad_top: 0x3A4555, grad_bottom: 0x1F2530}}
