# Display screenshot capture (dev/ops include)
#
# Lets you pull screenshots of the live UI over HTTP without standing in front
# of the panel.
#
# NOTE on component choice: the generic `display_capture` component only
# supports DisplayBuffer/RGB displays — NOT mipi_dsi or LVGL, which is what
# this panel uses. We use lvgl_screenshot (originally dcgrove/esphome-lvgl-
# screenshot), which grabs the LVGL frame directly.
#
# It's VENDORED into components/lvgl_screenshot/ rather than pulled from git:
# the upstream is LVGL-v8-only and won't compile against ESPHome's LVGL v9.5
# (2026.4.0+). Our local copy is ported to the v9 API — see the header comment
# in components/lvgl_screenshot/lvgl_screenshot.cpp for the specifics.
#
# `path: components` resolves relative to the ESPHome config dir (via
# CORE.relative_config_path) — i.e. esphome/components/ in the repo and
# /config/components/ in the container.
#
# Endpoint (own HTTP port, independent of web_server):
#   GET http://<device-ip>:8080/screenshot              -> JPEG of the current screen
#   GET http://<device-ip>:8080/screenshot?page=<name>  -> switch to a page, then capture
#
# Capture uses lv_snapshot_take() to render the active screen on demand, so it
# works regardless of LVGL's render mode (this panel runs PARTIAL — the active
# render buffer only holds the last dirty region, not the whole frame). That
# requires LV_USE_SNAPSHOT.
#
# ESPHome generates its OWN lv_conf.h and does NOT enable Kconfig for lvgl
# (LV_KCONFIG_PRESENT is gated on CONFIG_LV_COLOR_DEPTH, which ESPHome never
# sets), so CONFIG_LV_USE_SNAPSHOT=y via sdkconfig_options is ignored. ESPHome's
# lv_conf.h also omits LV_USE_SNAPSHOT entirely, so it defaults to 0. The one
# lever that wins is a global -D: lv_conf_internal.h guards the symbol with
# `#ifndef LV_USE_SNAPSHOT`, so a command-line definition takes precedence over
# the built-in default. build_flags apply to every TU including the lvgl
# managed component, which is where lv_snapshot.c lives.
---
esphome:
  platformio_options:
    build_flags:
      - "-DLV_USE_SNAPSHOT=1"

external_components:
  - source:
      type: local
      path: components
    components: [lvgl_screenshot]

lvgl_screenshot:
  port: 8080
  # GET /screenshot?page=<name> switches the panel to that page, lets it settle,
  # captures, then restores the page the user was on. Without ?page it captures
  # the live screen. Names are the query keys; page: is the LVGL page id.
  # Adjust this list to match the pages your device actually includes.
  pages:
    - name: main
      page: main_page
    - name: energy
      page: energy_page
    - name: climate
      page: climate_page
    - name: lights
      page: lights_page
    - name: security
      page: security_page
    - name: screensaver
      page: screensaver_page
    - name: info
      page: info_screen
