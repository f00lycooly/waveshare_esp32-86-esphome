# Local hardware contract for the Waveshare ESP32-P4-86-Panel.
#
# Electrical, framework, PSRAM, ESP Hosted, display, touch, and audio settings
# are taken from the known-working chrisdunnname baseline:
#   esphome-p4-86-panel-eth-2ro-lvgl/esp32-p4-86-panel.yaml
#
# IDs intentionally retain the application-facing names used by Assist and the
# completed Beads pages. Keep hardware changes isolated to this file and verify
# them on-device before changing application packages.
---

substitutions:
  # Screen Size
  screen_height: 720
  screen_width: 720

esphome:
  min_version: 2026.5.0
  project:
    name: "Waveshare.ESP32-P4-86-Panel"
    version: "1.0"

esp32:
  board: esp32-p4-evboard
  # This panel ships engineering-sample P4 silicon (eco2 ROM, chip rev v1.3).
  # Without engineering_sample, ESP-IDF assumes production silicon and the
  # FreeRTOS timer-task static stack alloc fails at boot
  # (assert vApplicationGetTimerTaskMemory: pxStackBufferTemp != NULL).
  # Mirrors the known-good chrisdunnname baseline (esp32-p4-86-panel.yaml).
  engineering_sample: true
  flash_size: 32MB
  framework:
    type: esp-idf
    components:
      - espressif/esp_hosted==2.12.1
    sdkconfig_options:
      CONFIG_ESP_HOSTED_MEMPOOL_PREFER_SPIRAM: y
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true

psram:
  # Baseline uses default PSRAM mode (not hex) — mode: hex contributed to the
  # boot-time PSRAM allocation failure on this engineering-sample silicon.
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

http_request:
  timeout: 30s
  watchdog_timeout: 60s

# -------------------------------------------
# Network hardware
# -------------------------------------------

# Ethernet settings
# ethernet:
#   type: IP101
#   mdc_pin: GPIO31
#   mdio_pin: GPIO52
#   clk:
#     pin: GPIO50
#     mode: CLK_EXT_IN
#   phy_addr: 1
#   power_pin: GPIO51

esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

# Firmware update for esp32_hosted ESP32-C6
update:
  - platform: esp32_hosted
    name: ESP-Hosted Firmware
    icon: mdi:chip
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h

# -------------------------------------------
# Bluetooth tracker
# -------------------------------------------
# The ESP32-P4 has no native radio — BLE runs through the hosted ESP32-C6
# co-processor declared above (esp32_hosted). esp32_ble_tracker scans for BLE
# advertisements; bluetooth_proxy relays them to Home Assistant so the panel
# acts as a BLE proxy / presence tracker for the front room.
esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

# -------------------------------------------
# LCD Back light and Relays
# -------------------------------------------
output:
  - platform: ledc
    id: gpio_backlight_pwm
    pin: GPIO26
    frequency: 100Hz
    inverted: true
    min_power: 0.0
    max_power: 0.8  # To prevent overheating due to excessive lighting

  - id: internal_relay_1
    platform: gpio
    pin: GPIO32

  - id: internal_relay_2
    platform: gpio
    pin: GPIO46

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    id: display_backlight
    restore_mode: ALWAYS_ON

# -------------------------------------------
# Touchscreen gt911
# -------------------------------------------
i2c:
  - id: i2c_bus_a
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz

touchscreen:
  platform: gt911
  id: my_touchscreen
  display: my_display
  i2c_id: i2c_bus_a
  # on_touch:
  #   - lambda: |-
  #       ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
  # on_update:
  #   - lambda: |-
  #       for (auto touch: touches)  {
  #           if (touch.state <= 2) {
  #             ESP_LOGI("Touch points:", "id=%d x=%d, y=%d x.raw=%d, y.raw=%d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
  #           }
  #       }

# -------------------------------------------
# Display mipi_dsi
# -------------------------------------------
display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-P4-86-PANEL

# Special LVGL settings required for this display
lvgl:
  rotation: ${rotation | default("0")}
  byte_order: little_endian

# -------------------------------------------
# Audio
# -------------------------------------------
switch:
  - platform: gpio
    id: audio_amplifier
    name: Speaker Enable
    icon: "mdi:speaker"
    entity_category: config
    pin: GPIO53  # BSP_POWER_AMP_IO
    restore_mode: RESTORE_DEFAULT_ON

i2s_audio:
  - id: i2s_audio_bus
    i2s_mclk_pin: GPIO13
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12

audio_dac:
  - platform: es8311
    id: my_dac
    i2c_id: i2c_bus_a
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 48000

audio_adc:
  - platform: es7210
    id: my_adc
    i2c_id: i2c_bus_a
    address: 0x40
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: my_microphone
    i2s_audio_id: i2s_audio_bus
    i2s_din_pin: GPIO11
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external
    channel: stereo
    # on_data:
    #   - logger.log:
    #       format: "Microphone data received: %d bytes"
    #       args: [x.size()]

speaker:
  - platform: i2s_audio
    id: my_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO9
    audio_dac: my_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

  - platform: mixer
    id: mixing_speaker
    output_speaker: my_speaker
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
