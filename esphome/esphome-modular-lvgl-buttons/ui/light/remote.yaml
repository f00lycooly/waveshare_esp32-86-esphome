---
# Home-Assistant light tile + color popup.
# Subscribes to a HA light entity; toggles & adjusts via homeassistant.action.
#
# Tile: icon + label + brightness slider. Short-click toggles the light;
# long-press opens a per-instance color popup with rainbow hue + kelvin
# rings. The popup itself lives in common/color_picker.yaml and is pulled
# in below via `packages:`, parameterized by ${uid}/${text}/${color_picker_mode}.
#
# Requires:
#   - ui/popup/popup_system.yaml (shared scrim, popup_close script,
#                                 hue_ring_img + kelvin_ring_img assets)
#
# Vars:
#   uid:               unique id (e.g. button_6)
#   entity_id:         HA light entity (e.g. light.kitchen)
#   row, column:       grid placement
#   text:              button label (also used as popup title)
#   icon:              glyph (default $mdi_lightbulb)
#   row_span, column_span: (default 1)
#   page_id:           parent page (default main_page)
#   color_picker_mode: "rgb" | "kelvin" | "both"  (default "both")
#                      Locks the popup to a single mode and hides the toggle
#                      button when not "both". For "both", `_show_popup`
#                      auto-selects HSV vs Kelvin from the light's supported
#                      color modes.

packages:
  color_picker: !include
    file: ../../common/color_picker.yaml
    vars:
      uid: ${uid}
      text: ${text}
      mode: ${color_picker_mode | default("both")}

globals:
  - id: ${uid}_is_on
    type: bool
    initial_value: 'false'
  - id: ${uid}_current_hue
    type: float
    initial_value: '0.0'
  - id: ${uid}_current_saturation
    type: float
    initial_value: '0.0'
  - id: ${uid}_current_color_temp
    type: float
    initial_value: '3000.0'
  - id: ${uid}_current_brightness
    type: float
    initial_value: '1.0'                 # 0.0–1.0
  - id: ${uid}_supports_rgb
    type: bool
    initial_value: 'false'
  - id: ${uid}_supports_color_temp
    type: bool
    initial_value: 'false'
  - id: ${uid}_supports_brightness
    type: bool
    initial_value: 'false'
  # Suppress HA→UI sync echoes so we don't re-send values we just received
  - id: ${uid}_suspend_send
    type: bool
    initial_value: 'false'
  # True when hs_color is currently providing valid hue/sat. Used to gate the
  # rgb_color fallback handler so it only fires on rgb*-mode lights (WLED).
  - id: ${uid}_hs_color_valid
    type: bool
    initial_value: 'false'
  # Set by the rgb_color handler after a successful sscanf parse.
  - id: ${uid}_rgb_color_applied
    type: bool
    initial_value: 'false'

# ── Tile + popup ──────────────────────────────────────────────────────────────

lvgl:
  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - container:
            id: ${uid}_tile
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            widgets:
              - button:
                  id: button_${uid}
                  widgets:
                    - label:
                        id: icon_${uid}
                        text_font: $icon_font
                        align: top_left
                        text: ${icon}
                    - label:
                        id: label_${uid}
                        align: bottom_left
                        long_mode: wrap
                        width: 100%
                        text: ${text}
                    - slider:
                        id: slider_${uid}
                        align: top_right
                        x: -5
                        y: 10
                        width: 30%
                        height: 75%
                        min_value: 0
                        max_value: 255
                        radius: 10
                        knob:
                          pad_top: -5
                          pad_bottom: -5
                          bg_color: $label_on_color
                        indicator:
                          radius: 0
                          bg_color: $label_off_color
                        on_release:
                          - globals.set:
                              id: ${uid}_current_brightness
                              value: !lambda return x / 255.0f;
                          - script.execute: ${uid}_light_set_brightness
                  on_short_click:
                    - script.execute: ${uid}_light_toggle
                  on_long_press:
                    - script.execute: ${uid}_show_popup

binary_sensor:
  - id: ${uid}_ha_state
    platform: homeassistant
    entity_id: ${entity_id}
    trigger_on_initial_state: true
    on_state:
      - lambda: id(${uid}_is_on) = x;
      - script.execute: ${uid}_update_bulb_color

text_sensor:
  - id: ${uid}_ha_brightness
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: brightness
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty() && x != "None";'
          then:
            - lambda: id(${uid}_current_brightness) = atof(x.c_str()) / 255.0f;
            - lvgl.slider.update:
                id: slider_${uid}
                value: !lambda return (int)(id(${uid}_current_brightness) * 255.0f);
            - lvgl.slider.update:
                id: ${uid}_popup_brightness
                value: !lambda return (int)(id(${uid}_current_brightness) * 255.0f);
            - script.execute: ${uid}_update_bulb_color

  - id: ${uid}_ha_color_temp
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: color_temp_kelvin
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty() && x != "None";'
          then:
            - lambda: id(${uid}_current_color_temp) = atof(x.c_str());
            - globals.set:
                id: ${uid}_suspend_send
                value: 'true'
            - lvgl.arc.update:
                id: ${uid}_kelvin_arc
                value: !lambda return (int) id(${uid}_current_color_temp);
            - globals.set:
                id: ${uid}_suspend_send
                value: 'false'
            - script.execute: ${uid}_update_bulb_color

  # HS color — HA returns "(hue, sat)" as a tuple string
  - id: ${uid}_ha_hs_color
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: hs_color
    internal: true
    on_value:
      - if:
          condition:
            lambda: 'return !x.empty() && x != "None";'
          then:
            - lambda: |-
                std::string s = x;
                size_t open  = s.find('(');
                size_t comma = s.find(',');
                size_t close = s.find(')');
                size_t hstart = (open  != std::string::npos) ? open  + 1 : 0;
                size_t cstart = (comma != std::string::npos) ? comma + 1 : 0;
                if (comma != std::string::npos) {
                  id(${uid}_current_hue) =
                      atof(s.substr(hstart, comma - hstart).c_str());
                  size_t clen = (close != std::string::npos)
                                  ? (close - cstart)
                                  : std::string::npos;
                  id(${uid}_current_saturation) =
                      atof(s.substr(cstart, clen).c_str());
                  id(${uid}_hs_color_valid) = true;
                }
            - globals.set:
                id: ${uid}_suspend_send
                value: 'true'
            - lvgl.arc.update:
                id: ${uid}_hue_arc
                value: !lambda return (int) id(${uid}_current_hue);
            - lvgl.slider.update:
                id: ${uid}_sat_slider
                value: !lambda return (int) id(${uid}_current_saturation);
            - globals.set:
                id: ${uid}_suspend_send
                value: 'false'
            - script.execute: ${uid}_update_bulb_color
          else:
            # hs_color is None — defer to rgb_color handler.
            - globals.set:
                id: ${uid}_hs_color_valid
                value: 'false'

  # RGB color — HA returns a tuple string like "(255, 128, 0)".
  # HA only populates hs_color when the active color_mode is `hs`; lights
  # running in rgb/rgbw/rgbww (e.g. WLED) report hs_color: None. This sensor
  # fills the gap by deriving hue/sat from rgb_color. The hs_color sensor
  # above remains authoritative for hs-native lights — this only runs when
  # hs_color is absent (the global is reset to a sentinel by hs_color when it
  # successfully parses; we check it here).
  - id: ${uid}_ha_rgb_color
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: rgb_color
    internal: true
    on_value:
      - if:
          condition:
            lambda: |-
              // Only apply if hs_color isn't carrying real data right now.
              return !x.empty() && x != "None" && !id(${uid}_hs_color_valid);
          then:
            - lambda: |-
                int r = 0, g = 0, b = 0;
                // Tolerate both "(r, g, b)" and "r, g, b" formats.
                int parsed = sscanf(x.c_str(), " ( %d , %d , %d )", &r, &g, &b);
                if (parsed != 3) parsed = sscanf(x.c_str(), " %d , %d , %d", &r, &g, &b);
                if (parsed == 3) {
                  float rf = r / 255.0f, gf = g / 255.0f, bf = b / 255.0f;
                  float mx = std::max({rf, gf, bf});
                  float mn = std::min({rf, gf, bf});
                  float d = mx - mn;
                  float h = 0.0f;
                  float s = (mx == 0.0f) ? 0.0f : (d / mx) * 100.0f;
                  if (d > 0.0001f) {
                    if      (mx == rf) h = 60.0f * fmod(((gf - bf) / d), 6.0f);
                    else if (mx == gf) h = 60.0f * (((bf - rf) / d) + 2.0f);
                    else               h = 60.0f * (((rf - gf) / d) + 4.0f);
                    if (h < 0) h += 360.0f;
                  }
                  id(${uid}_current_hue) = h;
                  id(${uid}_current_saturation) = s;
                  id(${uid}_rgb_color_applied) = true;
                } else {
                  id(${uid}_rgb_color_applied) = false;
                }
            - if:
                condition:
                  lambda: 'return id(${uid}_rgb_color_applied);'
                then:
                  - globals.set:
                      id: ${uid}_suspend_send
                      value: 'true'
                  - lvgl.arc.update:
                      id: ${uid}_hue_arc
                      value: !lambda return (int) id(${uid}_current_hue);
                  - lvgl.slider.update:
                      id: ${uid}_sat_slider
                      value: !lambda return (int) id(${uid}_current_saturation);
                  - globals.set:
                      id: ${uid}_suspend_send
                      value: 'false'
                  - script.execute: ${uid}_update_bulb_color

  - id: ${uid}_ha_supported_modes
    platform: homeassistant
    entity_id: ${entity_id}
    attribute: supported_color_modes
    internal: true
    on_value:
      - lambda: |-
          // HA supported_color_modes values:
          //   onoff, brightness, color_temp, hs, rgb, rgbw, rgbww, xy, white
          bool has_rgbww = x.find("rgbww") != std::string::npos;
          bool has_rgbw  = x.find("rgbw")  != std::string::npos;
          bool has_rgb   = x.find("rgb")   != std::string::npos;  // matches rgb/rgbw/rgbww
          bool has_hs    = x.find("hs")    != std::string::npos;
          bool has_xy    = x.find("xy")    != std::string::npos;
          bool has_ct    = x.find("color_temp") != std::string::npos;
          bool has_white = (x.find("\"white\"") != std::string::npos) ||
                           (x.find("'white'")  != std::string::npos);
          bool has_br    = x.find("brightness") != std::string::npos;

          id(${uid}_supports_color_temp) = has_ct;
          id(${uid}_supports_rgb)        = has_rgb || has_hs || has_xy;
          id(${uid}_supports_brightness) = id(${uid}_supports_rgb) ||
                                           id(${uid}_supports_color_temp) ||
                                           has_br || has_white;

          ESP_LOGI("light.caps",
                   "[%s] supported_color_modes=%s "
                   "-> rgb=%d ct=%d brightness=%d "
                   "(rgbww=%d rgbw=%d hs=%d xy=%d white=%d br_only=%d)",
                   "${entity_id}", x.c_str(),
                   id(${uid}_supports_rgb),
                   id(${uid}_supports_color_temp),
                   id(${uid}_supports_brightness),
                   has_rgbww, has_rgbw, has_hs, has_xy, has_white, has_br);


# ── Scripts ───────────────────────────────────────────────────────────────────

script:
  # Show this instance's popup (also bring up the scrim).
  - id: ${uid}_show_popup
    then:
      # For mode==both, pre-select Kelvin if the light is CT-only; HSV otherwise.
      # picker_apply_mode overrides this for single-mode pickers.
      - lambda: |-
          id(${uid}_mode_kelvin) =
            id(${uid}_supports_color_temp) && !id(${uid}_supports_rgb);
      - script.execute: ${uid}_picker_apply_mode
      - lvgl.widget.show: popup_scrim
      - lvgl.widget.show: ${uid}_popup
      - script.execute: ${uid}_picker_update

  # Recolor the tile icon to match bulb state.
  - id: ${uid}_update_bulb_color
    then:
      - if:
          condition:
            lambda: 'return id(${uid}_is_on);'
          then:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_on_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_on_color
          else:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_off_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_off_color
      - lambda: |-
          lv_color_t tint;
          if (!id(${uid}_is_on)) {
            tint = lv_color_make(120, 120, 120);
          } else if (id(${uid}_supports_rgb)) {
            uint16_t h = (uint16_t) id(${uid}_current_hue);
            uint8_t  s = (uint8_t)  id(${uid}_current_saturation);
            tint = lv_color_hsv_to_rgb(h, s, 100);
          } else if (id(${uid}_supports_color_temp)) {
            float t = id(${uid}_current_color_temp) / 100.0f;
            float r, g, b;
            if (t <= 66.0f) {
              r = 255.0f;
              g = 99.4708025861f * logf(t) - 161.1195681661f;
              b = (t <= 19.0f)
                    ? 0.0f
                    : 138.5177312231f * logf(t - 10.0f) - 305.0447927307f;
            } else {
              r = 329.698727446f * powf(t - 60.0f, -0.1332047592f);
              g = 288.1221695283f * powf(t - 60.0f, -0.0755148492f);
              b = 255.0f;
            }
            auto cl = [](float v) -> uint8_t {
              return (uint8_t)(v < 0 ? 0 : (v > 255 ? 255 : v));
            };
            tint = lv_color_make(cl(r), cl(g), cl(b));
          } else {
            tint = lv_color_make(255, 220, 100);  // plain warm white
          }
          lv_obj_set_style_text_color(id(icon_${uid}), tint, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(${uid}_bulb_icon), tint, LV_PART_MAIN);
          lv_obj_set_style_shadow_color(id(${uid}_bulb_container), tint, LV_PART_MAIN);
          int aura = id(${uid}_is_on)
            ? (int)(id(${uid}_current_brightness) * 120.0f)
            : 0;
          lv_obj_set_style_shadow_width(id(${uid}_bulb_container), aura, LV_PART_MAIN);

  - id: ${uid}_light_toggle
    then:
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: ${entity_id}

  - id: ${uid}_light_set_brightness
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: ${entity_id}
            brightness: !lambda return (int)(id(${uid}_current_brightness) * 255.0f);
      - script.execute: ${uid}_update_bulb_color

  - id: ${uid}_light_apply_hs
    then:
      - if:
          condition:
            lambda: 'return id(${uid}_suspend_send);'
          then: []
          else:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: ${entity_id}
                data_template:
                  hs_color: "{{ (hue|float, sat|float)|list }}"
                variables:
                  hue: !lambda return id(${uid}_current_hue);
                  sat: !lambda return id(${uid}_current_saturation);

  - id: ${uid}_light_apply_color_temp
    then:
      - if:
          condition:
            lambda: 'return id(${uid}_suspend_send);'
          then: []
          else:
            - homeassistant.action:
                action: light.turn_on
                data:
                  entity_id: ${entity_id}
                  color_temp_kelvin: !lambda return (int) id(${uid}_current_color_temp);
