---
# Local ESPHome light tile + color popup.
# Drives a local light: component directly via light.* actions.
# Capabilities (RGB / CCT / brightness) are auto-detected from the
# component's traits, including RGBW via the platform's white-routing.
#
# Tile: icon + label + brightness slider. Short-click toggles the light;
# long-press opens a per-instance color popup with rainbow hue + kelvin
# rings. The popup itself lives in common/color_picker.yaml and is pulled
# in below via `packages:`, parameterized by ${uid}/${text}/${color_picker_mode}.
#
# Requires:
#   - ui/popup/popup_system.yaml (shared scrim, popup_close script,
#                                 hue_ring_img + kelvin_ring_img assets)
#
# Vars:
#   uid:               unique id (e.g. button_6)
#   entity_id:         local ESPHome light component id (must be declared earlier)
#   row, column:       grid placement
#   text:              button label (also used as popup title)
#   icon:              glyph (default $mdi_lightbulb)
#   row_span, column_span: (default 1)
#   page_id:           parent page (default main_page)
#   color_picker_mode: "rgb" | "kelvin" | "both"  (default "both")
#                      Locks the popup to a single mode and hides the toggle
#                      button when not "both".

packages:
  color_picker: !include
    file: ../../common/color_picker.yaml
    vars:
      uid: ${uid}
      text: ${text}
      mode: ${color_picker_mode | default("both")}

globals:
  - id: ${uid}_is_on
    type: bool
    initial_value: 'false'
  - id: ${uid}_current_hue
    type: float
    initial_value: '0.0'
  - id: ${uid}_current_saturation
    type: float
    initial_value: '0.0'
  - id: ${uid}_current_color_temp
    type: float
    initial_value: '3000.0'
  - id: ${uid}_current_brightness
    type: float
    initial_value: '1.0'                 # 0.0–1.0
  - id: ${uid}_supports_rgb
    type: bool
    initial_value: 'false'
  - id: ${uid}_supports_color_temp
    type: bool
    initial_value: 'false'
  - id: ${uid}_supports_brightness
    type: bool
    initial_value: 'false'
  # Suppress HA→UI sync echoes so we don't re-send values we just received
  - id: ${uid}_suspend_send
    type: bool
    initial_value: 'false'

# ── Tile + popup ──────────────────────────────────────────────────────────────

lvgl:
  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - container:
            id: ${uid}_tile
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(1)}
            grid_cell_column_span: ${column_span | default(1)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            widgets:
              - button:
                  id: button_${uid}
                  widgets:
                    - label:
                        id: icon_${uid}
                        text_font: $icon_font
                        align: top_left
                        text: ${icon}
                    - label:
                        id: label_${uid}
                        align: bottom_left
                        long_mode: wrap
                        width: 100%
                        text: ${text}
                    - slider:
                        id: slider_${uid}
                        align: top_right
                        x: -5
                        y: 10
                        width: 30%
                        height: 75%
                        min_value: 0
                        max_value: 255
                        radius: 10
                        knob:
                          pad_top: -5
                          pad_bottom: -5
                          bg_color: $label_on_color
                        indicator:
                          radius: 0
                          bg_color: $label_off_color
                        on_release:
                          - globals.set:
                              id: ${uid}_current_brightness
                              value: !lambda return x / 255.0f;
                          - script.execute: ${uid}_light_set_brightness
                  on_short_click:
                    - script.execute: ${uid}_light_toggle
                  on_long_press:
                    - script.execute: ${uid}_show_popup

light:
  - id: !extend ${entity_id}
    on_state:
      then:
        - lambda: |-
            // Capabilities — traits are static; safe to refresh every state.
            auto traits = id(${entity_id}).get_traits();
            id(${uid}_supports_rgb) =
              traits.supports_color_capability(esphome::light::ColorCapability::RGB);
            id(${uid}_supports_color_temp) =
              traits.supports_color_capability(esphome::light::ColorCapability::COLOR_TEMPERATURE) ||
              traits.supports_color_capability(esphome::light::ColorCapability::COLD_WARM_WHITE);
            id(${uid}_supports_brightness) =
              traits.supports_color_capability(esphome::light::ColorCapability::BRIGHTNESS) ||
              id(${uid}_supports_rgb) || id(${uid}_supports_color_temp);

            // Sync current state to globals.
            auto val = id(${entity_id}).remote_values;
            id(${uid}_is_on) = val.is_on();
            id(${uid}_current_brightness) = val.get_brightness();

            if (id(${uid}_supports_rgb)) {
              float r = val.get_red(), g = val.get_green(), bv = val.get_blue();
              float max_c = std::max({r, g, bv});
              float min_c = std::min({r, g, bv});
              float delta = max_c - min_c;
              float hue = 0;
              if (delta > 0) {
                if (max_c == r)       hue = 60.0f * fmod((g - bv) / delta, 6.0f);
                else if (max_c == g)  hue = 60.0f * ((bv - r) / delta + 2.0f);
                else                  hue = 60.0f * ((r - g)  / delta + 4.0f);
                if (hue < 0) hue += 360.0f;
              }
              id(${uid}_current_hue) = hue;
              id(${uid}_current_saturation) = (max_c > 0) ? (delta / max_c) * 100.0f : 0;
            }
            if (id(${uid}_supports_color_temp)) {
              float mireds = val.get_color_temperature();
              if (mireds > 0) id(${uid}_current_color_temp) = 1000000.0f / mireds;
            }
        # Push fresh values into the UI widgets (suspend echo to avoid loops).
        - globals.set:
            id: ${uid}_suspend_send
            value: 'true'
        - lvgl.slider.update:
            id: slider_${uid}
            value: !lambda return (int)(id(${uid}_current_brightness) * 255.0f);
        - lvgl.slider.update:
            id: ${uid}_popup_brightness
            value: !lambda return (int)(id(${uid}_current_brightness) * 255.0f);
        - lvgl.arc.update:
            id: ${uid}_hue_arc
            value: !lambda return (int) id(${uid}_current_hue);
        - lvgl.slider.update:
            id: ${uid}_sat_slider
            value: !lambda return (int) id(${uid}_current_saturation);
        - lvgl.arc.update:
            id: ${uid}_kelvin_arc
            value: !lambda return (int) id(${uid}_current_color_temp);
        - globals.set:
            id: ${uid}_suspend_send
            value: 'false'
        - script.execute: ${uid}_update_bulb_color


# ── Scripts ───────────────────────────────────────────────────────────────────

script:
  # Show this instance's popup (also bring up the scrim).
  - id: ${uid}_show_popup
    then:
      # For mode==both, pre-select Kelvin if the light is CT-only; HSV otherwise.
      # picker_apply_mode overrides this for single-mode pickers.
      - lambda: |-
          id(${uid}_mode_kelvin) =
            id(${uid}_supports_color_temp) && !id(${uid}_supports_rgb);
      - script.execute: ${uid}_picker_apply_mode
      - lvgl.widget.show: popup_scrim
      - lvgl.widget.show: ${uid}_popup
      - script.execute: ${uid}_picker_update

  # Recolor the tile icon to match bulb state.
  - id: ${uid}_update_bulb_color
    then:
      - if:
          condition:
            lambda: 'return id(${uid}_is_on);'
          then:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_on_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_on_color
          else:
            - lvgl.widget.update:
                id: button_${uid}
                bg_color: $button_off_color
            - lvgl.widget.update:
                id: label_${uid}
                text_color: $label_off_color
      - lambda: |-
          lv_color_t tint;
          if (!id(${uid}_is_on)) {
            tint = lv_color_make(120, 120, 120);
          } else if (id(${uid}_supports_rgb)) {
            uint16_t h = (uint16_t) id(${uid}_current_hue);
            uint8_t  s = (uint8_t)  id(${uid}_current_saturation);
            tint = lv_color_hsv_to_rgb(h, s, 100);
          } else if (id(${uid}_supports_color_temp)) {
            float t = id(${uid}_current_color_temp) / 100.0f;
            float r, g, b;
            if (t <= 66.0f) {
              r = 255.0f;
              g = 99.4708025861f * logf(t) - 161.1195681661f;
              b = (t <= 19.0f)
                    ? 0.0f
                    : 138.5177312231f * logf(t - 10.0f) - 305.0447927307f;
            } else {
              r = 329.698727446f * powf(t - 60.0f, -0.1332047592f);
              g = 288.1221695283f * powf(t - 60.0f, -0.0755148492f);
              b = 255.0f;
            }
            auto cl = [](float v) -> uint8_t {
              return (uint8_t)(v < 0 ? 0 : (v > 255 ? 255 : v));
            };
            tint = lv_color_make(cl(r), cl(g), cl(b));
          } else {
            tint = lv_color_make(255, 220, 100);  // plain warm white
          }
          lv_obj_set_style_text_color(id(icon_${uid}), tint, LV_PART_MAIN);
          lv_obj_set_style_text_color(id(${uid}_bulb_icon), tint, LV_PART_MAIN);
          lv_obj_set_style_shadow_color(id(${uid}_bulb_container), tint, LV_PART_MAIN);
          int aura = id(${uid}_is_on)
            ? (int)(id(${uid}_current_brightness) * 120.0f)
            : 0;
          lv_obj_set_style_shadow_width(id(${uid}_bulb_container), aura, LV_PART_MAIN);

  - id: ${uid}_light_toggle
    then:
      - light.toggle: ${entity_id}

  - id: ${uid}_light_set_brightness
    then:
      - light.turn_on:
          id: ${entity_id}
          brightness: !lambda return id(${uid}_current_brightness);
      - script.execute: ${uid}_update_bulb_color

  # HSV → RGB. For `rgbw` / `rgbww` platforms ESPHome auto-extracts the
  # common minimum channel into the dedicated white LED(s), so we just
  # provide normalised R/G/B and let the platform route the white.
  - id: ${uid}_light_apply_hs
    then:
      - if:
          condition:
            lambda: 'return id(${uid}_suspend_send);'
          then: []
          else:
            - light.turn_on:
                id: ${entity_id}
                red: !lambda |-
                  float h = id(${uid}_current_hue);
                  float s = id(${uid}_current_saturation) / 100.0f;
                  float c = s,
                        xv = c * (1.0f - fabs(fmod(h / 60.0f, 2.0f) - 1.0f)),
                        m = 1.0f - c;
                  float r = (h < 60)  ? c
                          : (h < 120) ? xv
                          : (h >= 300) ? c : 0.0f;
                  return r + m;
                green: !lambda |-
                  float h = id(${uid}_current_hue);
                  float s = id(${uid}_current_saturation) / 100.0f;
                  float c = s,
                        xv = c * (1.0f - fabs(fmod(h / 60.0f, 2.0f) - 1.0f)),
                        m = 1.0f - c;
                  float g = (h >= 60  && h < 120) ? c
                          : (h < 60 || (h >= 120 && h < 180)) ? xv : 0.0f;
                  return g + m;
                blue: !lambda |-
                  float h = id(${uid}_current_hue);
                  float s = id(${uid}_current_saturation) / 100.0f;
                  float c = s,
                        xv = c * (1.0f - fabs(fmod(h / 60.0f, 2.0f) - 1.0f)),
                        m = 1.0f - c;
                  float bv = (h >= 180 && h < 240) ? c
                           : ((h >= 120 && h < 180) || (h >= 240 && h < 300)) ? xv
                           : 0.0f;
                  return bv + m;

  - id: ${uid}_light_apply_color_temp
    then:
      - if:
          condition:
            lambda: 'return id(${uid}_suspend_send);'
          then: []
          else:
            - light.turn_on:
                id: ${entity_id}
                # ESPHome color_temperature is in mireds; UI stores Kelvin.
                color_temperature: !lambda return 1000000.0f / id(${uid}_current_color_temp);
