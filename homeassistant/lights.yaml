# Template lights — wrap plain on/off switches as `light` entities so the panel's
# light tiles get a uniform domain. INPUTS: every switch.* entity_id below is the
# adopter's own switch — CHANGE each to match your hardware (and rename the lights
# to your rooms). These are illustrative examples, not normalized panel outputs.
- light:
    - name: "Office Outside Lights"
      unique_id: tpl_light_office_outside_lights
      state: "{{ is_state('switch.shelly1minig3_dcda0ce5efe4', 'on') }}"
      turn_on:
        action: switch.turn_on
        target: { entity_id: switch.shelly1minig3_dcda0ce5efe4 }
      turn_off:
        action: switch.turn_off
        target: { entity_id: switch.shelly1minig3_dcda0ce5efe4 }

